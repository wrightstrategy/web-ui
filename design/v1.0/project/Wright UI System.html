<script>
  (function () {
    var isROLoop = function (m) { return typeof m === 'string' && m.indexOf('ResizeObserver loop') !== -1; };
    if (typeof ResizeObserver !== 'undefined') {
      var RO = ResizeObserver;
      window.ResizeObserver = function (cb) {
        return new RO(function (entries, observer) {
          window.requestAnimationFrame(function () {
            try { cb(entries, observer); } catch (e) { if (!isROLoop(e && e.message)) throw e; }
          });
        });
      };
      window.ResizeObserver.prototype = RO.prototype;
    }
    window.addEventListener('error', function (e) {
      if (e && (isROLoop(e.message) || isROLoop(e && e.error && e.error.message))) {
        e.stopImmediatePropagation(); e.preventDefault(); return true;
      }
    }, true);
    var origErr = console.error;
    console.error = function () {
      var first = arguments[0];
      if (isROLoop(typeof first === 'string' ? first : first && first.message)) return;
      return origErr.apply(console, arguments);
    };
  })();
</script>

name: Claude Code

# Per-repo stub. Drop this into each repo at .github/workflows/claude.yml.
# All real logic lives in wrightstrategy/.github (private reusable workflow).
# The `on:` triggers MUST live here (reusable workflows can't define their own).
#
# Secrets used (both org-level, scoped to selected repos that have this stub):
#   CLAUDE_CODE_OAUTH_TOKEN — Anthropic auth (rotate via `claude setup-token`).
#   CLAUDE_WORKFLOWS_PAT    — fine-grained PAT with Workflows: Read & write,
#                             so Claude can push changes that touch
#                             `.github/workflows/*`. Required because the
#                             default GITHUB_TOKEN cannot carry workflows:write
#                             even when the Claude GitHub App has it granted.
#
# Both flow through to the reusable workflow via the explicit `secrets:` block
# below. `secrets: inherit` is intentionally NOT used — explicit forwarding is
# the most robust pattern across plan tiers and visibility configurations.

on:
  issues:
    # `opened` lets a user trigger Claude by including @claude in the initial
    # issue body or title — no separate comment needed.
    # `labeled` is the on-switch for the claude/bug/enhancement label paths.
    types: [opened, labeled]
  issue_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  pull_request_review_comment:
    types: [created]

jobs:
  agent:
    uses: wrightstrategy/.github/.github/workflows/claude.yml@main
    # Required: GitHub enforces caller-permissions >= called-workflow permissions.
    # Without this block, the org default (read-only) wins and the run fails at
    # workflow resolution with startup_failure + zero jobs created.
    # `id-token: write` specifically is required for claude-code-action's
    # internal OIDC handshake with the Anthropic API — without it the action
    # fails with "Unable to get ACTIONS_ID_TOKEN_REQUEST_URL env variable".
    permissions:
      contents: write
      pull-requests: write
      issues: write
      actions: read
      id-token: write
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      CLAUDE_WORKFLOWS_PAT: ${{ secrets.CLAUDE_WORKFLOWS_PAT }}
    # Optional per-repo model override, e.g. pin Opus on a specific repo:
    # with:
    #   model: "claude-opus-4-7"
